<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced View Positioning</title>
  <link rel="stylesheet" href="/node_modules/ol/ol.css">
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 16px; }
    h2 { margin: 0 0 10px 0; font-size: 20px; }
    .mapcontainer { position: relative; margin-bottom: 14px; width: 1000px; max-width: 100%; }
    .map { width: 1000px; max-width: 100%; height: 600px; border: 1px solid #d1d5db; }
    .map .ol-zoom { top: 178px; left: 158px; }
    .map .ol-rotate { top: 178px; right: 58px; }
    .map .ol-attribution,
    .map .ol-attribution.ol-uncollapsible { bottom: 30px; right: 50px; }
    .padding-top {
      position: absolute; top: 0; left: 0;
      width: 1000px; max-width: 100%; height: 170px;
      background: rgba(255, 255, 255, 0.5);
    }
    .padding-left {
      position: absolute; top: 170px; left: 0;
      width: 150px; height: 400px;
      background: rgba(255, 255, 255, 0.5);
    }
    .padding-right {
      position: absolute; top: 170px; left: 950px;
      width: 50px; height: 400px;
      background: rgba(255, 255, 255, 0.5);
    }
    .padding-bottom {
      position: absolute; top: 570px; left: 0;
      width: 1000px; max-width: 100%; height: 30px;
      background: rgba(255, 255, 255, 0.5);
    }
    .center {
      position: absolute; border: 1px solid black;
      top: 490px; left: 560px; width: 20px; height: 20px;
    }
  </style>
  <script type="importmap">
    {"imports": {"ol/": "/node_modules/ol/"}}
  </script>
</head>
<body>
  <div id="ROOT"></div>
  <script type="module" src="./center.bundle.js"></script>
</body>
</html>
